services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: domusmind
      POSTGRES_USER: domusmind
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_domusmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domusmind -d domusmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    gpus: all
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      ENV: ${ENV:-dev}
      DEBUG: ${DOMUSMIND_DEBUG:-false}
      DATABASE_URL: postgresql+asyncpg://domusmind:${DB_PASSWORD:-change_me_domusmind}@postgres:5432/domusmind
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis}@redis:6379/0
      HASS_URL: ${HASS_URL:-http://homeassistant:8123}
      HASS_TOKEN: ${HASS_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      LOCAL_MODEL: ${LOCAL_MODEL:-phi4}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-gemini,local,openai,claude}
      CAMERA_IP: ${CAMERA_IP:-192.168.2.218}
      CAMERA_USER: ${CAMERA_USER:-admin}
      CAMERA_PASSWORD: ${CAMERA_PASSWORD:-}
      DEFAULT_CAMERA_SOURCE: ${DEFAULT_CAMERA_SOURCE:-0}
      YOLO_WEIGHTS: ${YOLO_WEIGHTS:-models/yolov8x.pt}
      TORCH_DEVICE: ${TORCH_DEVICE:-auto}
      VISION_MONITOR_INTERVAL_SECONDS: ${VISION_MONITOR_INTERVAL_SECONDS:-300}
      VISION_OLLAMA_TIMEOUT_SECONDS: ${VISION_OLLAMA_TIMEOUT_SECONDS:-300}
      VISION_OLLAMA_MAX_WIDTH: ${VISION_OLLAMA_MAX_WIDTH:-640}
      VISION_OLLAMA_JPEG_QUALITY: ${VISION_OLLAMA_JPEG_QUALITY:-70}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-google}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: ./backend
    command: celery -A app.celery worker --loglevel=info -Q default,vision,memory,ha
    gpus: all
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      DATABASE_URL: postgresql+asyncpg://domusmind:${DB_PASSWORD:-change_me_domusmind}@postgres:5432/domusmind
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis}@redis:6379/0
      HASS_URL: ${HASS_URL:-http://homeassistant:8123}
      HASS_TOKEN: ${HASS_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CAMERA_IP: ${CAMERA_IP:-192.168.2.218}
      CAMERA_USER: ${CAMERA_USER:-admin}
      CAMERA_PASSWORD: ${CAMERA_PASSWORD:-}
      DEFAULT_CAMERA_SOURCE: ${DEFAULT_CAMERA_SOURCE:-0}
      YOLO_WEIGHTS: ${YOLO_WEIGHTS:-models/yolov8x.pt}
      TORCH_DEVICE: ${TORCH_DEVICE:-auto}
      VISION_MONITOR_INTERVAL_SECONDS: ${VISION_MONITOR_INTERVAL_SECONDS:-300}
      VISION_OLLAMA_TIMEOUT_SECONDS: ${VISION_OLLAMA_TIMEOUT_SECONDS:-300}
      VISION_OLLAMA_MAX_WIDTH: ${VISION_OLLAMA_MAX_WIDTH:-640}
      VISION_OLLAMA_JPEG_QUALITY: ${VISION_OLLAMA_JPEG_QUALITY:-70}
    volumes:
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build: ./backend
    command: celery -A app.celery beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://domusmind:${DB_PASSWORD:-change_me_domusmind}@postgres:5432/domusmind
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis}@redis:6379/0
      HASS_URL: ${HASS_URL:-http://homeassistant:8123}
      HASS_TOKEN: ${HASS_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEFAULT_CAMERA_SOURCE: ${DEFAULT_CAMERA_SOURCE:-0}
      VISION_MONITOR_INTERVAL_SECONDS: ${VISION_MONITOR_INTERVAL_SECONDS:-300}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  homeassistant:
    image: homeassistant/home-assistant:stable
    privileged: true
    ports:
      - "8123:8123"
    volumes:
      - ha_config:/config
    environment:
      TZ: America/Sao_Paulo
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8123/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ha_config:

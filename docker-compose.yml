services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: domusmind
      POSTGRES_USER: domusmind
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_domusmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domusmind -d domusmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://domusmind:${DB_PASSWORD:-change_me_domusmind}@postgres:5432/domusmind
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis}@redis:6379/0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: ./backend
    command: celery -A app.celery worker --loglevel=info -Q default,vision,memory,ha
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://domusmind:${DB_PASSWORD:-change_me_domusmind}@postgres:5432/domusmind
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis}@redis:6379/0
    volumes:
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build: ./backend
    command: celery -A app.celery beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://domusmind:${DB_PASSWORD:-change_me_domusmind}@postgres:5432/domusmind
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  homeassistant:
    image: homeassistant/home-assistant:stable
    network_mode: host
    privileged: true
    volumes:
      - ha_config:/config
    environment:
      TZ: America/Sao_Paulo
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ha_config:
